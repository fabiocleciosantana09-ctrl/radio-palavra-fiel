<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Fiel</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#0b0f2c,#000);
    color:white;
    text-align:center;
}

header{
    padding:30px 20px;
}

.logo{
    width:250px;
    max-width:90%;
}

h1{
    font-size:40px;
    margin:10px 0;
    color:#FFD700;
}

.descricao{
    font-size:18px;
    max-width:700px;
    margin:20px auto;
    line-height:1.6;
}

.player-box{
    background:#111;
    padding:30px;
    border-radius:15px;
    max-width:400px;
    margin:30px auto;
    box-shadow:0 0 20px rgba(255,215,0,0.5);
}

audio{
    width:100%;
    margin-top:15px;
}

.botao{
    display:inline-block;
    background:#FFD700;
    color:black;
    padding:12px 25px;
    margin-top:15px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

footer{
    margin-top:40px;
    padding:20px;
    background:#0b0f2c;
    font-size:14px;
}
</style>

<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

</head>
<body>

<header>
    <img src="logo.png" class="logo" alt="Rádio Palavra Fiel">
    <h1>Rádio Palavra Fiel</h1>
</header>

<div class="descricao">
A Rádio Palavra Fiel é uma rádio gospel criada para levar a Palavra de Deus até você 24 horas por dia.
Aqui você escuta louvores, pregações, testemunhos e muito mais para fortalecer sua fé.
</div>

<div class="player-box">
    <h2>🎧 Ouça Ao Vivo</h2>
    <audio controls autoplay>
        <source src="https://stream.zeno.fm/4yvsaq7rks8uv" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>
    <br>
    <a href="https://stream.zeno.fm/4yvsaq7rks8uv" target="_blank" class="botao">
        Ouvir Direto
    </a>
</div>

<footer>
© 2026 Rádio Palavra Fiel - Todos os direitos reservados
